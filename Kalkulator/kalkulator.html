<html>

<head>
    <link rel="stylesheet" href="kalkulator.css">
    <title>kalkulator</title>
</head>

<body>
    <div class="calculator">
        <table>
            <tr>
                <td colspan="6">
                    <input id="screen" readonly></input>
                </td>
            </tr>
            <tr>
                <td>
                    <button id="num1" onclick="append('1')">1</button>
                </td>
                <td>
                    <button id="num2" onclick="append('2')">2</button>
                </td>
                <td>
                    <button id="num3" onclick="append('3')">3</button>
                </td>
                <td></td>

                <td><button id="add" onclick="append('+')">+</button></td>
                <td><button id="delete" onclick="backspace()"><=</button></td>
            </tr>
            <tr>
                <td>
                    <button id="num4" onclick="append('4')">4</button>
                </td>
                <td>
                    <button id="num5" onclick="append('5')">5</button>
                </td>
                <td>
                    <button id="num6" onclick="append('6')">6</button>
                </td>
                <td></td>

                <td>
                    <button id="minus" onclick="append('-')">-</button>
                </td>
                <td>
                    <button id="clr" onclick="clearScreen()">C</button>
                </td>
            </tr>
            <tr>
                <td>
                    <button id="num7" onclick="append('7')">7</button>
                </td>
                <td>
                    <button id="num8" onclick="append('8')">8</button>
                </td>
                <td>
                    <button id="num9" onclick="append('9')">9</button>
                </td>
                <td></td>

                <td><button id="mult" onclick="append('*')">*</button></td>
            </tr>
            <tr>
                <td>
                    <button id="dot" onclick="append('.')">.</button>
                </td>
                <td>
                    <button id="num0" onclick="append('0')">0</button>
                </td>
                <td>
                    <button id="equal" onclick="calculate()">=</button>
                </td>
                <td></td>

                <td><button id="divide" onclick="append('/')">/</button></td>
            </tr>
        </table>
    </div>



    <script>
        var screen = document.getElementById("screen");

        function append(value){
            screen.value += value;
        }

        function calculate(){
            screen.value = eval(screen.value);
        }

        function backspace() {
            screen.value = screen.value.slice(0, -1);
        }

        function clearScreen() {
            screen.value = "";
        }
    </script>


</body>

</html>
